name: Build & Release APKs (per ABI)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # ضروري لإنشاء إصدار ورفع ملفات

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
          cache: true

      - name: Fix permissions
        run: chmod +x android/gradlew

      - name: Clean project
        run: |
          flutter clean
          rm -rf android/.gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/settings.gradle.kts', 'android/build.gradle.kts', 'android/app/build.gradle.kts') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Accept licenses (Android SDK)
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs for clarity
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             SR-Player-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             SR-Player-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
             SR-Player-x86_64.apk

      - name: Create/Update Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          name: "Latest Build"
          tag_name: "latest"
          body: "APKs for all architectures (auto-built from main branch)"
          files: |
            SR-Player-arm64-v8a.apk
            SR-Player-armeabi-v7a.apk
            SR-Player-x86_64.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}