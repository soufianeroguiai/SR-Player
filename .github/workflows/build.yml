name: Build S-Player APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Recreate Android platform
        run: flutter create --platforms android .

      # تثبيت Android SDK Platform 35 (مطلوب)
      - name: Install Android SDK Platform 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # إصلاح ملفات Gradle يدوياً
      - name: Fix Gradle configuration
        run: |
          # 1. تطبيق compileSdk 35 على التطبيق
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

          # 2. إضافة ext.flutter إلى root build.gradle (سيحل خطأ package_info_plus)
          cat >> android/build.gradle << 'EOF'

          // حقن خصائص Flutter لتكون متاحة لكل المشاريع الفرعية
          ext {
              flutter = [
                  sdk            : System.getenv('FLUTTER_ROOT') ?: '/opt/hostedtoolcache/flutter/stable-3.24.0-x64/flutter',
                  compileSdkVersion: 35,
                  buildToolsVersion: '35.0.0'
              ]
          }
          EOF

          # 3. رفع إصدار Android Gradle Plugin إلى 8.1.0
          sed -i "s/classpath 'com.android.tools.build:gradle:.*/classpath 'com.android.tools.build:gradle:8.1.0'/" android/build.gradle

          # 4. تفعيل AndroidX
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apks
          path: build/app/outputs/flutter-apk/*.apk