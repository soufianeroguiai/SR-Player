name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ================= CHECKOUT =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= JAVA =================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ================= FLUTTER =================
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      # ================= CACHE =================
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ================= GET DEPENDENCIES =================
      - name: Install dependencies
        run: flutter pub get

      # ================= ANALYZE =================
      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      # ================= TEST =================
      - name: Run tests
        run: flutter test
        continue-on-error: true

      # ================= BUILD APK =================
      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      # ================= UPLOAD ARTIFACT =================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ================= VERSION =================
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ================= RELEASE =================
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            🎬 S-Player Build

            ✔ Stable Flutter build
            ✔ media_kit compatible pipeline
            ✔ Android release APK
            ✔ Clean CI (no modifications during build)

            🚀 Auto-generated by GitHub Actions
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}