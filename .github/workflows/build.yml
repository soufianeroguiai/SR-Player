name: Build SR Player APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 جلب الكود
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Java 17 (ضروري لـ Flutter Android)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 🐦 Flutter setup
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.5"
          channel: stable
          cache: true

      # 🧹 تنظيف كامل (مهم لحل photo_manager + cache مشاكل)
      - name: Clean project
        run: |
          flutter clean
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf .dart_tool

      # 📦 تثبيت الحزم (حل مشكلة photo_manager نهائيًا)
      - name: Install dependencies
        run: |
          flutter pub cache repair
          flutter pub get --verbose

      # 🔍 فحص المشروع (اختياري)
      - name: Flutter doctor
        run: flutter doctor -v

      # 🔥 بناء APK
      - name: Build release APK
        run: flutter build apk --release

      # 📌 استخراج version من pubspec.yaml
      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 📦 رفع APK كـ artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SR-Player-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/app-release.apk

      # 🚀 إنشاء Release رسمي
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SR Player v${{ steps.version.outputs.version }}
          body: |
            🎬 SR Player Release

            ✔ Flutter Stable Build
            ✔ Java 17
            ✔ media_kit compatible
            ✔ photo_manager fixed
            ✔ Auto generated APK

            📌 Version: ${{ steps.version.outputs.version }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}