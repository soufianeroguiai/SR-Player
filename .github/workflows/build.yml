name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # لتشغيل البناء يدويًا من GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 استنساخ الكود
        uses: actions/checkout@v4

      - name: ☕️ إعداد Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🐦 إعداد Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'   # يدعم sdk >=3.0.0
          channel: 'stable'

      - name: 📦 تثبيت المكتبات
        run: flutter pub get

      - name: 🔨 بناء Debug APK
        run: flutter build apk --debug

      - name: 📤 رفع الـ APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-player-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk