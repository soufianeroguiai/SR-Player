name: Build S-Player APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install Android SDK Platform 36
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties

      - name: Remove root settings.gradle.kts
        run: rm -f settings.gradle.kts

      - name: Fix missing kotlin_version in build.gradle.kts
        run: |
          if ! grep -q "kotlin_version" android/build.gradle.kts; then
            echo "ext.kotlin_version = '1.9.0'" >> android/build.gradle.kts
          else
            # استبدل كل استخدام لـ kotlin_version برقم ثابت 1.9.0
            sed -i 's/\$kotlin_version/1.9.0/g' android/build.gradle.kts
          fi

      - name: Build release APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apks
          path: build/app/outputs/flutter-apk/*.apk