name: Build S-Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: source

      # ── 2. Java ──────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      # ── 4. Create fresh Flutter project (ينشئ مجلد android كامل) ─
      - name: Create base Flutter project
        run: |
          flutter create \
            --project-name s_player \
            --org com.splayer \
            --platforms android \
            base_project

      # ── 5. Copy our source code over the base project ────────────
      - name: Overlay our source onto base project
        run: |
          # نسخ كل كودنا فوق المشروع الجديد
          cp -r source/lib                base_project/
          cp    source/pubspec.yaml       base_project/
          
          # نسخ AndroidManifest و MainActivity و styles و build.gradle
          cp source/android/app/src/main/AndroidManifest.xml \
             base_project/android/app/src/main/AndroidManifest.xml

          cp source/android/app/src/main/kotlin/com/splayer/app/MainActivity.kt \
             base_project/android/app/src/main/kotlin/com/splayer/app/MainActivity.kt

          cp source/android/app/src/main/res/values/styles.xml \
             base_project/android/app/src/main/res/values/styles.xml

          cp source/android/app/src/main/res/drawable/launch_background.xml \
             base_project/android/app/src/main/res/drawable/launch_background.xml

          cp source/android/app/build.gradle \
             base_project/android/app/build.gradle

          cp source/android/gradle.properties \
             base_project/android/gradle.properties

          # نسخ assets لو موجودة
          if [ -d "source/assets" ]; then
            cp -r source/assets base_project/
          fi

      # ── 6. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        working-directory: base_project
        run: flutter pub get

      # ── 7. Analyze (optional) ────────────────────────────────────
      - name: Analyze code
        working-directory: base_project
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Build APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: base_project
        run: flutter build apk --release --no-shrink

      # ── 9. Upload APK as artifact ─────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: s-player-apk
          path: base_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 10. GitHub Release (عند push لـ main فقط) ────────────────
      - name: Get version from pubspec
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        id: version
        run: |
          VERSION=$(grep '^version:' source/pubspec.yaml | sed 's/version: //' | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: S-Player v${{ steps.version.outputs.version }}
          body: |
            ## S-Player APK
            تم البناء تلقائياً بواسطة GitHub Actions ✅
            
            حمّل ملف `app-release.apk` وثبّته على جهازك.
          files: base_project/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
