name: s_player
description: S-Player - Advanced Video Player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ================= VIDEO ENGINE (MEDIA_KIT STABLE STACK) =================
  media_kit: ^1.2.0
  media_kit_video: ^1.2.0
  media_kit_libs_video: ^1.0.7

  # ================= FILE & MEDIA ACCESS =================
  file_picker: ^8.1.6
  photo_manager: ^3.6.0

  # ================= PERMISSIONS (ANDROID 13/14 READY) =================
  permission_handler: ^11.3.1

  # ================= STATE MANAGEMENT =================
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # ================= UI / ICONS =================
  material_symbols_icons: ^4.2719.1

  # ================= UTILITIES =================
  path: ^1.9.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  wakelock_plus: ^1.2.1

  # ================= PLAYER FEATURES (VLC-LIKE CONTROLS) =================
  screen_brightness: ^2.1.7
  volume_controller: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/