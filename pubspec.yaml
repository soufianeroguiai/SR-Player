name: video_player_app
description: Video Player - Full Featured Video Player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.8.3
  chewie: ^1.8.1
  file_picker: ^8.0.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  path: ^1.9.0
  intl: ^0.19.0
  wakelock_plus: ^1.2.1
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
